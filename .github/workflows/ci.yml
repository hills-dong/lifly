name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Backend Check & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lifly
          POSTGRES_PASSWORD: lifly
          POSTGRES_DB: lifly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lifly"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://lifly:lifly@localhost:5432/lifly_test
      JWT_SECRET: ci-test-secret
      LLM_API_KEY: not-configured
      LLM_API_URL: https://api.example.com/v1
      FILE_STORAGE_PATH: /tmp/lifly-test-files
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check compilation
        working-directory: server
        run: cargo check

      - name: Run tests
        working-directory: server
        run: cargo test -- --test-threads=1

  frontend-check:
    name: Frontend Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Type check
        working-directory: web
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: web
        run: pnpm test

      - name: Build
        working-directory: web
        run: pnpm build
